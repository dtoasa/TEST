<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEMOCLAW CORE - Agent Monitor</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111;
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --neon-gray: #444;
            --shadow: 0 0 15px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: var(--shadow) var(--neon-green);
            margin-bottom: 30px;
            font-size: 2.5rem;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            position: relative;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow: 15px 15px 30px rgba(0,0,0,0.7);
        }

        .agent-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
            color: #ddd;
        }

        .foco {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto;
            background-color: var(--neon-gray);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            transition: background-color 0.5s ease, box-shadow 0.5s ease;
            position: relative;
        }

        .foco::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        /* Status Styles */
        .foco.online {
            background-color: var(--neon-green);
            box-shadow: var(--shadow) var(--neon-green);
        }

        .foco.error {
            background-color: var(--neon-red);
            box-shadow: var(--shadow) var(--neon-red);
        }

        .foco.off {
            background-color: var(--neon-gray);
            box-shadow: none;
        }

        .status-text {
            display: block;
            margin-top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        .ram-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>NEMOCLAW MONITOR</h1>

    <div class="grid" id="monitor-grid">
        <!-- Cards generated by JS -->
    </div>

    <div class="ram-info">CORE VRAM OPTIMIZED | 40GB RAM | NEMOCLAW OS</div>

    <script>
        const agents = [
            "Tutor-Pro", "Quiz-Master", "Vision-VAR", "Sentinel-Log", 
            "Scraper-X", "Office-Clerk", "Audio-Sentry", "Cloud-Syncer", 
            "Game-Server", "Neural-Net"
        ];

        function createCards() {
            const grid = document.getElementById('monitor-grid');
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${agent.replace(/\s+/g, '-')}`;
                card.innerHTML = `
                    <span class="agent-name">${agent}</span>
                    <div class="foco" id="foco-${agent}"></div>
                    <span class="status-text" id="status-${agent}">Waiting...</span>
                `;
                grid.appendChild(card);
            });
        }

        async function updateStatus() {
            try {
                const response = await fetch('status_agentes.json', { cache: "no-store" });
                const data = await response.json();

                agents.forEach(agent => {
                    const foco = document.getElementById(`foco-${agent}`);
                    const statusText = document.getElementById(`status-${agent}`);
                    const status = data[agent] || 'off';

                    foco.className = 'foco ' + status;
                    statusText.textContent = status === 'online' ? 'Online' : (status === 'error' ? 'Error' : 'Offline');
                    
                    if(status === 'online') statusText.style.color = 'var(--neon-green)';
                    else if(status === 'error') statusText.style.color = 'var(--neon-red)';
                    else statusText.style.color = '#666';
                });
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        createCards();
        updateStatus();
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
